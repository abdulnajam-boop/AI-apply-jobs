<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Applisynai Extension</title>
    <style>
      body {
        font-family: Inter, Arial, sans-serif;
        margin: 0;
        padding: 14px;
        width: 300px;
        background: #f8fafc;
        color: #0f172a;
      }
      h1 { font-size: 16px; margin: 0 0 4px; }
      p { font-size: 12px; color: #475569; margin: 0 0 10px; }
      .grid { display: grid; gap: 8px; }
      button {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px;
        background: white;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        text-align: left;
      }
      .primary { background: #0f172a; color: white; border-color: #0f172a; }
      .muted { opacity: 0.65; cursor: not-allowed; }
      #status { margin-top: 10px; font-size: 12px; color: #334155; }
    </style>
  </head>
  <body>
    <h1>Applisynai</h1>
    <p>Smart job actions from the current page.</p>

    <div class="grid">
      <button id="save-job" class="primary">Save Job</button>
      <button id="match-job">Match This Job</button>
      <button id="tailor-resume">Tailor Resume</button>
      <button id="autofill" class="muted" disabled>Autofill Application (Coming Soon)</button>
    </div>

    <div id="status">Ready.</div>

    <script type="module" src="popup.ts"></script>
  </body>
</html>
